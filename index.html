<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>BAZAR — объявления Кыргызстана</title>
<meta name="description" content="Макет торговой площадки: купля-продажа товаров и услуг в Кыргызстане">
<meta name="theme-color" content="#ffffff">
<script>
/* тема до первой отрисовки — без вспышки белого в тёмном режиме */
try {
  var th = JSON.parse(localStorage.getItem('bazar_theme') || '"system"');
  var dark = th === 'dark' || (th === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  var tc = document.querySelector('meta[name="theme-color"]');
  if (tc) tc.setAttribute('content', dark ? '#1a1f26' : '#ffffff');
} catch (e) {}
</script>
<link rel="stylesheet" href="css/styles.css?v=18">
</head>
<body>

<header class="header" id="header">
  <div class="header-inner container">
    <a class="logo" href="#/" data-link>
      <span class="logo-mark">B</span>
      <span class="logo-text">bazar<span class="logo-dot">.kg</span></span>
    </a>

    <button class="city-btn" id="cityBtn" title="Город">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 21s-7-5.5-7-11a7 7 0 1 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.6"/></svg>
      <span id="cityBtnLabel">Весь Кыргызстан</span>
    </button>

    <div class="searchbar" id="searchbar">
      <input type="text" id="searchInput" placeholder="Поиск по объявлениям…" autocomplete="off" enterkeyhint="search" data-i18n-ph="search.ph">
      <button class="searchbar-btn" id="searchGo" data-i18n="search.go">Найти</button>
      <div class="search-suggest" id="searchSuggest" hidden></div>
    </div>

    <nav class="header-actions">
      <button class="ctrl-btn" id="langBtn" aria-label="Язык / Language / Тил">RU</button>
      <button class="ctrl-btn" id="themeBtn" aria-label="Тема">🌗</button>
      <a href="#/favorites" data-link class="icon-btn" title="Избранное">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 21C8 17.5 3 13.6 3 9a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 4.6-5 8.5-9 12z"/></svg>
        <span class="badge" id="favBadge" hidden></span>
      </a>
      <a href="#/chats" data-link class="icon-btn" title="Сообщения">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21 12a8 8 0 0 1-8 8H4l1.6-3.2A8 8 0 1 1 21 12z"/></svg>
        <span class="badge" id="chatBadge" hidden></span>
      </a>
      <a href="#/profile" data-link class="icon-btn" title="Профиль">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-3.5 4.5-5 8-5s6.5 1.5 8 5"/></svg>
      </a>
      <a href="#/post" data-link class="btn btn-primary post-btn" data-i18n="post.btn">Подать объявление</a>
    </nav>
  </div>
</header>

<main id="app" class="container"></main>

<nav class="bottomnav" id="bottomnav">
  <a href="#/" data-link data-nav="home">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg>
    <span data-i18n="nav.home">Главная</span>
  </a>
  <a href="#/favorites" data-link data-nav="favorites">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21C8 17.5 3 13.6 3 9a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 4.6-5 8.5-9 12z"/></svg>
    <span data-i18n="nav.favs">Избранное</span>
    <span class="badge" data-badge="fav" hidden></span>
  </a>
  <a href="#/post" data-link data-nav="post" class="bottomnav-post">
    <span class="bottomnav-plus">+</span>
    <span data-i18n="nav.post">Подать</span>
  </a>
  <a href="#/chats" data-link data-nav="chats">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a8 8 0 0 1-8 8H4l1.6-3.2A8 8 0 1 1 21 12z"/></svg>
    <span data-i18n="nav.chats">Чаты</span>
    <span class="badge" data-badge="chat" hidden></span>
  </a>
  <a href="#/profile" data-link data-nav="profile">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-3.5 4.5-5 8-5s6.5 1.5 8 5"/></svg>
    <span data-i18n="nav.profile">Профиль</span>
  </a>
</nav>

<div class="modal-backdrop" id="modalBackdrop" hidden>
  <div class="modal" id="modalBox" role="dialog"></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<button class="ai-fab" id="aiFab" aria-label="ИИ-помощница Диана">
  <span class="ai-fab-icon">✨</span>
</button>

<div class="ai-panel" id="aiPanel" hidden role="dialog" aria-label="ИИ-помощница">
  <div class="ai-head">
    <span class="ai-head-avatar">✨</span>
    <div class="ai-head-info">
      <div class="ai-head-name" data-i18n="ai.name">Диана · ИИ-помощница</div>
      <div class="ai-head-sub"><span class="ai-online"></span><span data-i18n="ai.sub">демо · отвечает мгновенно</span></div>
    </div>
    <button class="icon-btn" data-ai-clear title="Очистить диалог" aria-label="Очистить диалог">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
    </button>
    <button class="icon-btn" data-ai-close aria-label="Закрыть">✕</button>
  </div>
  <div class="ai-msgs" id="aiMsgs"></div>
  <div class="chip-row ai-quick" id="aiQuick"></div>
  <div class="ai-inputrow">
    <input type="text" id="aiInput" placeholder="Опишите, что ищете…" autocomplete="off" enterkeyhint="send" data-i18n-ph="ai.ph">
    <button data-ai-send aria-label="Отправить">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<script src="js/data.js?v=18"></script>
<script src="js/i18n.js?v=18"></script>
<script src="js/search.js?v=18"></script>
<script src="js/map.js?v=18"></script>
<script src="js/vision.js?v=18"></script>
<script src="js/app.js?v=18"></script>
<script src="js/ai.js?v=18"></script>
</body>
</html>
