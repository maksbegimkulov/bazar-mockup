<script>
/* тема до первой отрисовки — без вспышки белого в тёмном режиме */
try {
  var th = JSON.parse(localStorage.getItem('bazar_theme') || '"system"');
  var dark = th === 'dark' || (th === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  var tc = document.querySelector('meta[name="theme-color"]');
  if (tc) tc.setAttribute('content', dark ? '#1a1f26' : '#ffffff');
} catch (e) {}
</script>
<script>
/* авто-обновление: если на сервере версия новее загруженной — сразу
   перезагрузиться со свежим index (?fresh=N бьёт кэш index.html на GitHub
   Pages), чтобы юзер не застревал на старом JS и его публикации долетали в
   облако. BUILD бампается вместе с version.txt при каждом деплое. */
(function () {
  var BUILD = 93;
  try {
    fetch('version.txt?cb=' + Date.now(), { cache: 'no-store' })
      .then(function (r) { return r.ok ? r.text() : null; })
      .then(function (t) {
        if (!t) return;
        var sv = parseInt(t.trim(), 10);
        if (sv > BUILD && sessionStorage.getItem('bz_upd') !== String(sv)) {
          sessionStorage.setItem('bz_upd', String(sv));
          location.replace(location.pathname + '?fresh=' + sv + (location.hash || ''));
        }
      })
      .catch(function () {});
  } catch (e) {}

  /* офлайн-режим и установка как приложения. Регистрируем после load, чтобы
     не отбирать канал у первой отрисовки. Перезагрузку воркер НЕ инициирует —
     за обновление отвечает проверка version.txt выше, иначе получим две
     конкурирующие перезагрузки. */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
})();
</script>
